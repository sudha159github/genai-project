# ──────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — yt-genai (Interview Master)
#
# Builds Docker images for Backend (Node/Express) and Frontend (React/Vite),
# pushes them to GitHub Container Registry, and deploys to a VPS via SSH.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   MONGO_URI              – MongoDB Atlas connection string
#   JWT_SECRET             – JWT signing secret
#   GOOGLE_GENAI_API_KEY   – Google GenAI API key
#   VITE_API_URL           – Public URL of the backend API (e.g. https://api.yourdomain.com)
#   VPS_HOST               – Server IP or hostname
#   VPS_USER               – SSH user on the server
#   VPS_SSH_KEY            – Private SSH key for authentication
# ──────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/frontend

jobs:
  # ── Job 1: Lint & basic checks ────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./Backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./Frontend
        run: npm run lint

  # ── Job 2: Build & push Docker images ─────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──
      - name: Build & push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──
      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # ── Login to GHCR ──
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull latest images ──
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # ── Stop existing containers (if any) ──
            docker stop yt-genai-backend yt-genai-frontend 2>/dev/null || true
            docker rm yt-genai-backend yt-genai-frontend 2>/dev/null || true

            # ── Run Backend ──
            docker run -d \
              --name yt-genai-backend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e GOOGLE_GENAI_API_KEY="${{ secrets.GOOGLE_GENAI_API_KEY }}" \
              ${{ env.BACKEND_IMAGE }}:latest

            # ── Run Frontend ──
            docker run -d \
              --name yt-genai-frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ env.FRONTEND_IMAGE }}:latest

            # ── Cleanup old images ──
            docker image prune -f
